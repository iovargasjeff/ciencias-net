createAnnouncementRequest:
  type: object
  additionalProperties: false
  required:
    - title
    - body
    - audience_type
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 200
    body:
      type: string
      minLength: 1
      maxLength: 10000
    audience_type:
      type: string
      enum:
        - all
        - roles
        - sections
        - accounts
    audience_ids:
      type: array
      minItems: 1
      uniqueItems: true
      items:
        type: string
      description: Roles, secciones o cuentas reales segun `audience_type`.
    publish_at:
      type: string
      format: date-time
