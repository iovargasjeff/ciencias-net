createAccountRequest:
  type: object
  additionalProperties: false
  required:
    - name
    - email
    - roles
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 150
    email:
      type: string
      format: email
    roles:
      type: array
      minItems: 1
      uniqueItems: true
      items:
        $ref: '../openapi.yaml#/components/schemas/Role'
    dni:
      type: string
      minLength: 8
      maxLength: 8
      description: Requerido para docente, padre y alumno.
    last_names:
      type: string
      maxLength: 150
      description: Requerido para docente, padre y alumno.
    phone:
      type: string
      maxLength: 15
      description: Requerido para docente y padre.
    notification_email:
      type: string
      format: email
      description: Requerido para padre.
updateAccountRequest:
  type: object
  additionalProperties: false
  required: []
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 150
    email:
      type: string
      format: email
