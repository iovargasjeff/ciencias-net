services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cienciasnet}
      POSTGRES_USER: ${DB_USERNAME:-cienciasnet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cienciasnet_local}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks: [private, public]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cienciasnet} -d ${DB_DATABASE:-cienciasnet}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      target: development
    environment: &backend-environment
      APP_ENV: local
      APP_KEY: ${APP_KEY:-base64:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173,http://127.0.0.1:5173
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-cienciasnet}
      DB_USERNAME: ${DB_USERNAME:-cienciasnet}
      DB_PASSWORD: ${DB_PASSWORD:-cienciasnet_local}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      SANCTUM_STATEFUL_DOMAINS: localhost:5173,127.0.0.1:5173
      FACIAL_SERVICE_URL: http://facial-api:8001
      FACIAL_SERVICE_TOKEN: ${FACIAL_SERVICE_TOKEN:-local-only-token}
      FACIAL_SERVICE_TIMEOUT: 5
      RUN_MIGRATIONS: "true"
    volumes:
      - ./backend:/var/www
      - ./backend/.env.example:/var/www/.env:ro
      - backend_vendor:/var/www/vendor
    ports:
      - "127.0.0.1:8000:8000"
    networks: [private, public]
    depends_on:
      db:
        condition: service_healthy
      facial-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  queue:
    build:
      context: ./backend
      target: development
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "false"
    volumes:
      - ./backend:/var/www
      - ./backend/.env.example:/var/www/.env:ro
      - backend_vendor:/var/www/vendor
    command: php artisan queue:work --sleep=3 --tries=3
    networks: [private]
    depends_on:
      backend:
        condition: service_healthy

  facial-api:
    build: ./facial-service
    environment:
      FACIAL_SERVICE_TOKEN: ${FACIAL_SERVICE_TOKEN:-local-only-token}
    networks: [private]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks: [public]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend-e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    profiles: [test]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm run build && npx playwright test"
    networks: [public]
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  pgdata:
  backend_vendor:
  frontend_node_modules:

networks:
  public:
  private:
    internal: true
