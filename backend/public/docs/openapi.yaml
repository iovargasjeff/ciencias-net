      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Correo único de la cuenta humana. Must be a valid email address. Must not be greater than 191 characters.'
                  example: usuario@example.test
                password:
                  type: string
                  description: 'Contraseña de la cuenta.'
                  example: correct-password
                remember:
