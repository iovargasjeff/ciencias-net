                  description: 'Orden del grado dentro del nivel. Must be at least 1.'
                  example: 5
                academic_period_id:
                  type: string
                  description: 'Identificador del periodo académico. Must be a valid UUID. The <code>id</code> of an existing record in the periodos_academicos table.'
