openapi: 3.0.3
info:
  title: 'CienciasNET API API Documentation'
  description: 'Contrato HTTP versionado de CienciasNET.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: Endpoints
    description: ''
paths:
  /api/v1/health:
    get:
      summary: ''
      operationId: getApiV1Health
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    status: ok
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
      tags:
        - Endpoints
      security: []
  /api/v1/station-activations:
    post:
      summary: ''
      operationId: postApiV1StationActivations
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                activation_code:
                  type: string
                  description: 'Must not be greater than 191 characters.'
                  example: b
                device_name:
                  type: string
                  description: 'Must not be greater than 150 characters.'
                  example: 'n'
              required:
                - activation_code
                - device_name
      security: []
  /api/v1/station/session:
    get:
      summary: ''
      operationId: getApiV1StationSession
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error:
                    code: unauthenticated
                    message: 'Debes activar la estación.'
                    fields: {  }
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: unauthenticated
                      message:
                        type: string
                        example: 'Debes activar la estación.'
                      fields:
                        type: object
                        properties: {  }
      tags:
        - Endpoints
      security: []
  /api/v1/station/captures:
    post:
      summary: ''
      operationId: postApiV1StationCaptures
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: 'Must be a file. Must be an image. Must not be greater than 5120 kilobytes.'
                camera_id:
                  type: string
                  description: 'Must be a valid UUID. The <code>id</code> of an existing record in the camaras_estacion table.'
                  example: 6ff8f7f6-1eb3-3525-be4a-3932c805afed
                captured_at:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-06-09T00:09:42'
              required:
                - image
                - camera_id
                - captured_at
      security: []
  /api/v1/auth/login:
    post:
      summary: ''
      operationId: postApiV1AuthLogin
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Correo único de la cuenta humana. Must be a valid email address. Must not be greater than 191 characters.'
                  example: usuario@example.test
                password:
                  type: string
                  description: 'Contraseña de la cuenta.'
                  example: correct-password
                remember:
                  type: boolean
                  description: 'Mantener la sesión al cerrar el navegador.'
                  example: false
              required:
                - email
                - password
      security: []
