                name:
                  type: string
                  description: 'Nombre del periodo académico. Must not be greater than 100 characters.'
                  example: 'Año académico 2026'
                start_date:
                  type: string
                  description: 'Fecha de inicio del periodo. Must be a valid date.'
                  example: '2026-03-01'
                end_date:
                  type: string
                  description: 'Fecha de cierre del periodo. Must be a valid date. Must be a date after or equal to <code>start_date</code>.'
                  example: '2026-12-20'
                status:
                  type: string
                  description: 'Estado operativo del periodo.'
                  example: active
                  enum:
                    - draft
