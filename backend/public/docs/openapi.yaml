                  example: 11111111-1111-4111-8111-111111111111
                student_id:
                  type: string
                  description: 'Identificador del alumno vinculado. Must be a valid UUID. The <code>id</code> of an existing record in the alumnos table.'
                  example: 22222222-2222-4222-8222-222222222222
