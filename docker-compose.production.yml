services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    env_file:
      - ${CIENCIASNET_ENV_FILE:-/etc/cienciasnet/production.env}
    environment: &backend-environment
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      FACIAL_SERVICE_URL: http://facial-api:8001
      RUN_MIGRATIONS: "true"
    volumes:
      - backend_storage:/var/www/storage/app/private
      - backend_cache:/var/www/bootstrap/cache
    networks: [private, public]
    depends_on:
      db:
        condition: service_healthy
      facial-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 6

  api:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./backend/public:/var/www/public:ro
      - ./ops/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [public, private]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 6

  queue:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    env_file:
      - ${CIENCIASNET_ENV_FILE:-/etc/cienciasnet/production.env}
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "false"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - backend_storage:/var/www/storage/app/private
      - backend_cache:/var/www/bootstrap/cache
    networks: [private]
    depends_on:
      backend:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    env_file:
      - ${CIENCIASNET_ENV_FILE:-/etc/cienciasnet/production.env}
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "false"
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - backend_storage:/var/www/storage/app/private
      - backend_cache:/var/www/bootstrap/cache
    networks: [private]
    depends_on:
      backend:
        condition: service_healthy

  facial-api:
    build: ./facial-service
    restart: unless-stopped
    env_file:
      - ${CIENCIASNET_ENV_FILE:-/etc/cienciasnet/production.env}
    networks: [private]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: ./frontend
      target: serve
    restart: unless-stopped
    env_file:
      - ${CIENCIASNET_ENV_FILE:-/etc/cienciasnet/production.env}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    networks: [public]
    depends_on:
      api:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    profiles: [operations]
    env_file:
      - ${CIENCIASNET_ENV_FILE:-/etc/cienciasnet/production.env}
    volumes:
      - backend_storage:/var/lib/cienciasnet/private:ro
      - ${BACKUP_ROOT:-/backups/cienciasnet}:/backups
      - ./ops/backup:/ops/backup:ro
    entrypoint: ["/bin/sh", "/ops/backup/backup.sh"]
    networks: [private]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  backend_storage:
  backend_cache:

networks:
  public:
  private:
    internal: true
